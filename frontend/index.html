<!DOCTYPE html>
<html>
<head>
<title>Inicio</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    margin:0;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

button{
    display:block;
    width:200px;
    margin:10px auto;
    padding:10px;
    background:#003d79;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0050a0;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">
        <h1>🎓 Sistema de Horarios</h1>
        <p>Bienvenido</p>

        <button onclick="irLogin()">Iniciar Sesión</button>
        <button onclick="irRegistro()">Registrarse</button>
    </div>
</div>

<script>
function irLogin(){
    window.location.href="login.html";
}

function irRegistro(){
    window.location.href="registro.html";
}
</script>

</body>
</html>
