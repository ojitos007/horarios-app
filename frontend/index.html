<!DOCTYPE html>
<html>
<head>
<title>Inicio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    overflow:hidden;
}

/* FONDO */
.background{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(34,197,94,0.15);
    animation:float 8s infinite ease-in-out;
}

.circle:nth-child(1){
    width:250px;
    height:250px;
    top:-50px;
    left:-50px;
}

.circle:nth-child(2){
    width:180px;
    height:180px;
    bottom:-40px;
    right:-40px;
    animation-delay:2s;
}

.circle:nth-child(3){
    width:120px;
    height:120px;
    top:50%;
    left:70%;
    animation-delay:4s;
}

@keyframes float{
    0%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-20px);
    }
    100%{
        transform:translateY(0px);
    }
}

/* CONTENEDOR */
.container{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(30,41,59,0.95);
    padding:45px;
    border-radius:25px;
    width:380px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    animation:fadeIn 0.8s ease;
    backdrop-filter:blur(10px);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TITULO */
h1{
    font-size:34px;
    margin-bottom:15px;
}

p{
    color:#cbd5e1;
    margin-bottom:30px;
    font-size:16px;
}

/* BOTONES */
button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 15px rgba(34,197,94,0.3);
}

button:hover{
    transform:translateY(-3px) scale(1.02);
    background:#16a34a;
}

/* BOTÓN SECUNDARIO */
.secondary{
    background:#334155;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.secondary:hover{
    background:#475569;
}

/* FOOTER */
.footer{
    margin-top:20px;
    font-size:12px;
    color:#94a3b8;
}

/* RESPONSIVE */
@media(max-width:500px){

    .card{
        width:95%;
        padding:30px;
    }

    h1{
        font-size:28px;
    }

}

</style>

</head>

<body>

<!-- FONDO -->
<div class="background">

    <div class="circle"></div>
    <div class="circle"></div>
    <div class="circle"></div>

</div>

<!-- CONTENIDO -->
<div class="container">

    <div class="card">

        <h1>🎓 Sistema de Horarios</h1>

        <p>
            Plataforma inteligente para gestión académica y generación automática de horarios escolares.
        </p>

        <button onclick="irLogin()">
            Iniciar Sesión
        </button>

        <button class="secondary" onclick="irRegistro()">
            Registrarse
        </button>

        <div class="footer">
            Proyecto MVC + FastAPI + AWS Cloud
        </div>

    </div>

</div>

<script>

function irLogin(){

    window.location.href = "login.html";

}

function irRegistro(){

    window.location.href = "registro.html";

}

</script>

</body>
</html>
