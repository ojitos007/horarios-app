<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* CARD */
.card{
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    width:300px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    text-align:center;
    animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:20px;
}

/* INPUTS */
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    outline:none;
    transition:0.2s;
}

input:focus{
    background:#475569;
}

/* PASSWORD WRAPPER */
.password-container{
    position:relative;
}

.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:12px;
    color:#22c55e;
}

/* BOTÓN */
button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    background:#16a34a;
    transform:scale(1.05);
}

/* ERROR */
.error{
    margin-top:10px;
    color:#f87171;
    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<h2>Iniciar Sesión</h2>

<form id="formLogin">

<input id="usuario" placeholder="Usuario" required>

<div class="password-container">
    <input id="password" type="password" placeholder="Password" required>
    <span class="toggle" onclick="togglePassword()">VER</span>
</div>

<button type="submit">Entrar</button>

</form>

<div id="error" class="error"></div>

</div>

<script>

// 👁️ Mostrar/ocultar contraseña
function togglePassword(){
    const pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }
}

// LOGIN
document.getElementById("formLogin").onsubmit = async function(e){
    e.preventDefault();

    const usuario = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    const errorDiv = document.getElementById("error");
    errorDiv.innerText = "";

    try{

        const response = await fetch("http://127.0.0.1:8000/login",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                usuario: usuario,
                password: password
            })
        });

        const result = await response.json();

        console.log(result);

        if(result.status === "admin"){
            localStorage.setItem("rol", "admin");
            window.location.href = "admin.html";
        }
        else if(result.status === "maestro"){

            localStorage.setItem("rol", "maestro");
            localStorage.setItem("nombre", result.nombre);
            localStorage.setItem("tipo", result.tipo);
            localStorage.setItem("materia", result.materia);
            localStorage.setItem("grupo", result.grupo);
            localStorage.setItem("horas", result.horas);

            window.location.href = "dashboard.html";
        }
        else{
            errorDiv.innerText = "Usuario o contraseña incorrectos";
        }

    }catch(err){
        errorDiv.innerText = "Error de conexión con el servidor";
    }

}

</script>

</body>
</html>
